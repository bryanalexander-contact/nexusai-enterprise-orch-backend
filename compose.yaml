services:
  db:
    image: pgvector/pgvector:pg16
    container_name: nexusai-db
    env_file:
      - .env
      #hola
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - nexusai-data:/var/lib/postgresql/data

volumes:
  nexusai-data:
