spring:
  application:
    name: NexusAI-Backend
  
  # Configuración de Google Gemini
  ai:
    google:
      ai:
        api-key: ${GOOGLE_AI_API_KEY}
        chat:
          options:
            model: gemini-1.5-flash # O gemini-1.5-flash para más velocidad
            temperature: 0.7

  # Base de Datos PostgreSQL con pgvector
  datasource:
    url: jdbc:postgresql://localhost:5432/nexusai
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true # Útil para ver las transacciones de Wallet en consola
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Configuración de Negocio (Monetización)
app:
  billing:
    cost-per-request: 0.05 # Costo ficticio en créditos por cada pregunta
    initial-balance: 1.00 # Saldo de regalo para nuevos usuarios
  stripe:
    api-key: ${STRIPE_API_KEY}